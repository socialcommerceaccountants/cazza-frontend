title = "Cazza.ai Gitleaks Configuration"

[[rules]]
description = "GitHub Personal Access Token"
regex = '''ghp_[0-9a-zA-Z]{36}'''

[[rules]]
description = "GitHub OAuth Access Token"
regex = '''gho_[0-9a-zA-Z]{36}'''

[[rules]]
description = "GitHub App Installation Access Token"
regex = '''ghs_[0-9a-zA-Z]{36}'''

[[rules]]
description = "GitHub Refresh Token"
regex = '''ghr_[0-9a-zA-Z]{36}'''

[[rules]]
description = "Generic API Key"
regex = '''(?i)(api[_-]?key|apikey|secret)[=:]\s*["']?[0-9a-zA-Z\-_]{16,64}["']?'''

[[rules]]
description = "AWS Access Key ID"
regex = '''(?<![A-Z0-9])[A-Z0-9]{20}(?![A-Z0-9])'''

[[rules]]
description = "AWS Secret Access Key"
regex = '''(?<![A-Za-z0-9/+=])[A-Za-z0-9/+=]{40}(?![A-Za-z0-9/+=])'''

[[rules]]
description = "Google API Key"
regex = '''AIza[0-9A-Za-z\\-_]{35}'''

[[rules]]
description = "Google OAuth Client ID"
regex = '''[0-9]+-[0-9A-Za-z_]{32}\\.apps\\.googleusercontent\\.com'''

[[rules]]
description = "Stripe API Key"
regex = '''(?:r|s)k_(live|test)_[0-9a-zA-Z]{24,99}'''

[[rules]]
description = "Slack Token"
regex = '''xox[baprs]-([0-9a-zA-Z]{10,48})?'''

[[rules]]
description = "Password in URL"
regex = '''[a-zA-Z]{3,10}://[^/\\s:@]{3,20}:[^/\\s:@]{3,20}@.{1,100}[\"'\\s]'''

[[rules]]
description = "Private Key"
regex = '''-----BEGIN (?:RSA|DSA|EC|OPENSSH|PGP) PRIVATE KEY-----'''

[[rules]]
description = "JWT Token"
regex = '''eyJ[a-zA-Z0-9_-]{10,}\\.[a-zA-Z0-9_-]{10,}\\.[a-zA-Z0-9_-]{10,}'''

[[rules]]
description = "Vercel Token"
regex = '''[a-z0-9]{24}_[a-z0-9]{27}'''

[[rules]]
description = "SendGrid API Key"
regex = '''SG\.[a-zA-Z0-9-_]{22}\.[a-zA-Z0-9-_]{43}'''

[[rules]]
description = "Twilio API Key"
regex = '''SK[0-9a-fA-F]{32}'''

[[rules]]
description = "Mailgun API Key"
regex = '''key-[0-9a-zA-Z]{32}'''

# Allow list for false positives
[[allowlist]]
description = "Example tokens in documentation"
paths = [
  "README.md",
  "CONTRIBUTING.md",
  "docs/**"
]

[[allowlist]]
description = "Test files"
paths = [
  "**/*.test.*",
  "**/*.spec.*",
  "tests/**"
]

[[allowlist]]
description = "Package lock files"
paths = [
  "package-lock.json",
  "yarn.lock"
]